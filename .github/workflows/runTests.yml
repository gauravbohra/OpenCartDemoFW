# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Automation suite

on:
  workflow_dispatch:
    inputs:
      browserName:
        type: choice
        required: true
        description: 'Select browser for execution'
        options:
          - chrome
          - firefox
          - edge
        default: chrome
      testName:
        type: string
        description: 'Enter the regex to run the tests'
        default: testCases.TC001AccountRegistrationTest
      xmlName:
        type: string
        description: 'Enter the xml to run the tests'

  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run tests with regex
      if: ${{inputs.testName}}
      run: > 
            mvn test 
            -Dbrowser=${{inputs.browserName}} 
            -Dtest=${{inputs.testName}}
            -Dmaven.test.failure.ignore=true
    - name: Run tests with xml
      if: ${{inputs.xmlname}}
      run: >
            mvn test 
            -DsuiteXmlFile=${{inputs.xmlName}} 
            -Dmaven.test.failure.ignore=true
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: extentReport
        path: ./reports/ExtentReport*.html

  
